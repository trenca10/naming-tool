<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WCPDC — Document Name Builder</title>
<style>
/* WCPDC theme — extracted from PG03 PPTX
   Brand red:        #EB0A1E (Toyota corporate, used as accent)
   Slate (PG):       #1E293B
   Construction:     #945200 (warm brown)
   Operations:       #0070C0 (corporate blue)
   Relocation:       #196B24 (deep green)
   Text primary:     #272525
   Surface light:    #F2F2F2
*/
:root {
  color-scheme: light;
  --c-brand:       #EB0A1E;
  --c-brand-dark:  #B30815;
  --c-text:        #272525;
  --c-text-muted:  #6b6b6b;
  --c-text-soft:   #999;
  --c-bg:          #F2F2F2;
  --c-surface:     #FFFFFF;
  --c-border:      #E0E0E0;
  --c-border-soft: #ECECEC;
  --c-construction:#945200;
  --c-operations:  #0070C0;
  --c-relocation:  #196B24;
  --c-governance:  #1E293B;
  --c-ok-bg:       #E8F1E5;
  --c-ok-text:     #1F5723;
  --c-ok-bd:       #B7D3B0;
  --c-ko-bg:       #FBE9EB;
  --c-ko-text:     #8E1620;
  --c-ko-bd:       #E5B8BD;
  --shadow-sm:     0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  --shadow-md:     0 2px 8px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
  --radius:        4px;
  --font-display: "Toyota Type Black", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  --font-body: "Toyota Type", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Monaco", Consolas, monospace;
}
* { box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 1140px; margin: 0 auto; padding: 0 20px 32px; }

/* ==== HEADER BAR ==== */
.topbar {
  background: var(--c-governance);
  color: #fff;
  padding: 18px 0 14px;
  margin-bottom: 24px;
  border-bottom: 3px solid var(--c-brand);
}
.topbar-inner {
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.brand-mark {
  width: 38px;
  height: 38px;
  background: var(--c-brand);
  color: #fff;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 0.5px;
}
h1 {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 800;
  margin: 0;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.brand-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255,255,255,0.65);
  margin-top: 2px;
}
.lang-switch {
  display: inline-flex;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  overflow: hidden;
  background: transparent;
  flex-shrink: 0;
}
.lang-switch button {
  border: none;
  background: transparent;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-family: var(--font-body);
  letter-spacing: 0.6px;
}
.lang-switch button.active {
  background: var(--c-brand);
  color: #fff;
}

.sub {
  font-size: 12.5px;
  color: var(--c-text-muted);
  margin-bottom: 18px;
  line-height: 1.55;
}
.sub code {
  background: var(--c-surface);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--c-text);
  border: 1px solid var(--c-border-soft);
}

/* ==== TABS ==== */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--c-border);
  margin-bottom: 22px;
}
.tab {
  padding: 10px 18px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--c-text-muted);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  position: relative;
  transition: color 0.15s;
}
.tab:hover { color: var(--c-text); }
.tab.active { color: var(--c-text); }
.tab.active::after {
  content: '';
  position: absolute;
  left: 12px; right: 12px; bottom: -1px;
  height: 3px;
  background: var(--c-brand);
}
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.18s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

/* ==== LEGEND ==== */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 0 0 18px;
  font-size: 11px;
}
.legend .chip {
  padding: 5px 12px;
  border-radius: 3px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 0.3px;
  border: 1px solid transparent;
  box-shadow: var(--shadow-sm);
}
.legend .chip.brown { background: var(--c-construction); border-color: var(--c-construction); }
.legend .chip.blue  { background: var(--c-operations);   border-color: var(--c-operations); }
.legend .chip.green { background: var(--c-relocation);   border-color: var(--c-relocation); }
.legend .chip.grey  { background: var(--c-governance);   border-color: var(--c-governance); }

/* ==== CARDS / FIELDS ==== */
.card {
  background: var(--c-surface);
  border-radius: var(--radius);
  border: 1px solid var(--c-border);
  padding: 22px;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 16px; }
.card-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--c-text-muted);
  margin: 0 0 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--c-border-soft);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--c-text-muted);
  font-weight: 700;
}
.field select, .field input {
  padding: 9px 11px;
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  font-size: 13px;
  background: #fff;
  font-family: var(--font-body);
  color: var(--c-text);
  transition: border-color 0.12s, box-shadow 0.12s;
}
.field select:focus, .field input:focus {
  outline: none;
  border-color: var(--c-brand);
  box-shadow: 0 0 0 3px rgba(235,10,30,0.12);
}
.field select:disabled {
  background: #FAFAFA;
  color: #aaa;
  cursor: not-allowed;
}
.field input.invalid { border-color: var(--c-brand-dark); background: #FFF5F6; }
.field .hint { font-size: 11px; color: var(--c-text-soft); }

/* ==== PREVIEW (filename) ==== */
.preview {
  margin-top: 18px;
  padding: 20px 22px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  border-left: 5px solid var(--pole-color, #ccc);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}
.preview::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 4px; height: 100%;
  background: var(--pole-color, transparent);
  opacity: 0.15;
}
.preview .label-row {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--c-text-soft);
  font-weight: 700;
  margin-bottom: 10px;
}
.filename {
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 600;
  word-break: break-all;
  color: var(--c-text);
  line-height: 1.5;
}
.filename .seg {
  padding: 3px 5px;
  border-radius: 3px;
  border: 1px solid transparent;
}
.filename .seg.pole    { background: rgba(235,10,30,0.10);   border-color: rgba(235,10,30,0.20); color: var(--c-brand-dark); font-weight: 700; }
.filename .seg.docnum  { background: rgba(0,112,192,0.10);    border-color: rgba(0,112,192,0.18); color: #054C82; }
.filename .seg.name    { background: rgba(148,82,0,0.10);     border-color: rgba(148,82,0,0.18);  color: #6B3C00; }
.filename .seg.status  { background: rgba(25,107,36,0.12);    border-color: rgba(25,107,36,0.22); color: #135018; font-weight: 600; }
.filename .seg.ver     { background: rgba(30,41,59,0.08);     border-color: rgba(30,41,59,0.18);  color: #1E293B; }

.actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  padding: 9px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--c-brand);
  background: var(--c-brand);
  color: #fff;
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: 0.4px;
  cursor: pointer;
  font-family: var(--font-body);
  text-transform: uppercase;
  transition: all 0.12s;
}
.btn:hover:not(:disabled) { background: var(--c-brand-dark); border-color: var(--c-brand-dark); }
.btn.secondary {
  background: #fff;
  color: var(--c-text);
  border-color: var(--c-border);
}
.btn.secondary:hover:not(:disabled) { background: #FAFAFA; border-color: #BBB; color: var(--c-text); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.copied { background: var(--c-relocation); border-color: var(--c-relocation); }

/* ==== DECODE CELLS ==== */
.decode {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 8px;
}
.decode .cell {
  background: #FAFAFA;
  border: 1px solid var(--c-border-soft);
  border-radius: var(--radius);
  padding: 10px 12px;
  border-left: 3px solid var(--pole-color, #DDD);
}
.decode .k {
  font-size: 9.5px;
  text-transform: uppercase;
  color: var(--c-text-soft);
  letter-spacing: 0.7px;
  font-weight: 700;
}
.decode .v {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--c-text);
  margin-top: 3px;
  font-family: var(--font-mono);
}
.decode .desc { font-size: 11px; color: var(--c-text-muted); margin-top: 3px; }

/* ==== HISTORY ==== */
.history { margin-top: 22px; }
.history h3 {
  font-family: var(--font-display);
  font-size: 11.5px;
  margin: 0 0 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--c-text-muted);
  font-weight: 800;
}
.hist-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--c-surface);
  border: 1px solid var(--c-border-soft);
  border-radius: var(--radius);
  margin-bottom: 5px;
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.1s;
}
.hist-item:hover {
  background: #FAFAFA;
  border-color: var(--c-border);
}
.hist-item .del {
  font-size: 16px;
  color: var(--c-text-soft);
  padding: 0 6px;
  cursor: pointer;
  border: none;
  background: none;
  line-height: 1;
}
.hist-item .del:hover { color: var(--c-brand); }

/* ==== VALIDATOR RESULT ==== */
.val-result {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  border-left: 4px solid;
}
.val-result.ok {
  background: var(--c-ok-bg);
  border: 1px solid var(--c-ok-bd);
  border-left-color: var(--c-relocation);
  color: var(--c-ok-text);
}
.val-result.ko {
  background: var(--c-ko-bg);
  border: 1px solid var(--c-ko-bd);
  border-left-color: var(--c-brand);
  color: var(--c-ko-text);
}
.val-result h4 {
  margin: 0 0 8px;
  font-size: 13px;
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: 0.3px;
}
.val-result ul { margin: 4px 0 0 18px; padding: 0; }
.val-result code {
  background: rgba(0,0,0,0.06);
  padding: 1px 5px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 11.5px;
}

/* ==== REFERENCE TREE ==== */
.ref-block {
  margin-bottom: 16px;
  padding: 14px;
  background: #FAFAFA;
  border-radius: var(--radius);
  border-left: 3px solid var(--pole-color, #ccc);
}
.ref-block h4 {
  font-family: var(--font-display);
  font-size: 12px;
  margin: 0 0 8px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.ref-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 4px 12px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--c-text);
}

footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--c-border-soft);
  font-size: 11px;
  color: var(--c-text-soft);
  text-align: center;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">WC<br>PDC</div>
      <div>
        <h1 data-i18n="title">WCPDC — Document Name Builder</h1>
        <div class="brand-tag">Document Management Plan · v2.5</div>
      </div>
    </div>
    <div class="lang-switch">
      <button data-lang="fr">FR</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="sub" data-i18n-html="subtitle"></div>

  <div class="legend">
    <span class="chip brown" data-i18n="legendConstruction"></span>
    <span class="chip blue" data-i18n="legendOperations"></span>
    <span class="chip green" data-i18n="legendRelocation"></span>
    <span class="chip grey" data-i18n="legendGovernance"></span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="gen" data-i18n="tabGenerator"></button>
    <button class="tab" data-tab="val" data-i18n="tabValidator"></button>
    <button class="tab" data-tab="ref" data-i18n="tabReference"></button>
  </div>

  <!-- GENERATOR -->
  <section id="panel-gen" class="panel active">
    <div class="card">
      <div class="card-title" data-i18n="cardComposeTitle">Composition du nom</div>
      <div class="grid">
        <div class="field">
          <label data-i18n="fieldPole"></label>
          <select id="g-pole"></select>
          <span class="hint" data-i18n="hintPole"></span>
        </div>
        <div class="field">
          <label data-i18n="fieldDomain"></label>
          <select id="g-domain" disabled></select>
          <span class="hint" data-i18n="hintDomain"></span>
        </div>
        <div class="field">
          <label data-i18n="fieldSub"></label>
          <select id="g-sub" disabled></select>
          <span class="hint" data-i18n="hintSub"></span>
        </div>
        <div class="field">
          <label data-i18n-html="fieldDocNum"></label>
          <input id="g-docnum" type="text" maxlength="5" placeholder="31014">
          <span class="hint" data-i18n="hintDocNum"></span>
        </div>
        <div class="field" style="grid-column: span 2;">
          <label data-i18n="fieldName"></label>
          <input id="g-name" type="text" data-i18n-attr="placeholder|placeholderName">
          <span class="hint" data-i18n="hintName"></span>
        </div>
        <div class="field">
          <label data-i18n="fieldStatus"></label>
          <select id="g-status"></select>
        </div>
        <div class="field">
          <label data-i18n="fieldVersion"></label>
          <input id="g-version" type="text" value="1.0" placeholder="1.0">
          <span class="hint" data-i18n="hintVersion"></span>
        </div>
      </div>
    </div>

    <div class="preview" id="g-preview-box">
      <div class="label-row" data-i18n="previewLabel"></div>
      <div class="filename" id="g-preview">—</div>
      <div class="decode" id="g-decode"></div>
      <div class="actions">
        <button class="btn" id="g-copy" disabled data-i18n="btnCopy"></button>
        <button class="btn secondary" id="g-save" disabled data-i18n="btnSave"></button>
        <button class="btn secondary" id="g-reset" data-i18n="btnReset"></button>
      </div>
    </div>

    <div class="history">
      <h3 data-i18n="historyTitle"></h3>
      <div id="g-history"></div>
    </div>
  </section>

  <!-- VALIDATOR -->
  <section id="panel-val" class="panel">
    <div class="card">
      <div class="card-title" data-i18n="cardValidatorTitle">Validation</div>
      <div class="field">
        <label data-i18n="fieldValidator"></label>
        <input id="v-input" type="text" placeholder="AO43_[31014]_Steering-Committee-Pack_IFA_v2.5">
      </div>
      <div class="actions">
        <button class="btn" id="v-check" data-i18n="btnCheck"></button>
        <button class="btn secondary" id="v-example" data-i18n="btnExample"></button>
      </div>
      <div id="v-result"></div>
    </div>
  </section>

  <!-- REFERENCE -->
  <section id="panel-ref" class="panel">
    <div class="card">
      <div class="card-title" data-i18n="cardReferenceTitle">Référentiel REF</div>
      <div class="field" style="max-width: 420px;">
        <label data-i18n="fieldReference"></label>
        <select id="r-pole"></select>
      </div>
      <div id="r-tree" style="margin-top: 18px;"></div>
    </div>
  </section>

  <footer data-i18n="footer"></footer>
</div>

<script>

const I18N = {

    errPattern: 'Le nom ne respecte pas le pattern <code>[XX][NN]_[#####]?_NAME_STATUS_vX.Y</code>',
    errStart: 'Doit commencer par 2 lettres majuscules (pole).',

// Helper: get domains object for current lang and given pole-type
function getDomains(poleType) {
  const block = DOMAINS[poleType];
  const labels = block[LANG] || block.fr;
  const result = {};
  Object.entries(labels).forEach(([label, key]) => { result[label] = block.subs[key]; });
  return result;
}

// Find domain & subfolder for a given pole + subCode (lang-aware)
function findDomainForSub(poleType, subCode) {
  const block = DOMAINS[poleType];
  const labels = block[LANG] || block.fr;
  for (const label in labels) {
    const key = labels[label];
    const hit = block.subs[key].find(([c]) => c === subCode);
    if (hit) return { domain: label, name: hit[1] };
  }
  return null;
}

// ============ HELPERS ============
function $(sel) { return document.querySelector(sel); }
function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function kebab(str) {
  return (str || '')
    .normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-zA-Z0-9\s-]/g, ' ')
    .trim()
    .split(/[\s_]+/).filter(Boolean)
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join('-');
}

// ============ APPLY TRANSLATIONS ============
function applyI18n() {
  document.documentElement.lang = LANG;
  const tr = t();
  document.querySelectorAll('[data-i18n]').forEach(node => {
    const key = node.getAttribute('data-i18n');
    if (tr[key]) node.textContent = tr[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(node => {
    const key = node.getAttribute('data-i18n-html');
    if (tr[key]) node.innerHTML = tr[key];
  });
  document.querySelectorAll('[data-i18n-attr]').forEach(node => {
    const [attr, key] = node.getAttribute('data-i18n-attr').split('|');
    if (tr[key]) node.setAttribute(attr, tr[key]);
  });
  // language buttons
  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === LANG);
  });
  // populate selects
  populatePoleSelects();
  populateStatusSelect();
  // re-run dependent UIs
  cascadeFromPole(true);
  renderHistory();
  renderRef();
  updatePreview();
}

function populatePoleSelects() {
  const tr = t();
  [gPole, rPole].forEach(sel => {
    const current = sel.value;
    sel.innerHTML = '';
    if (sel === gPole) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = tr.selectPlaceholder;
      sel.appendChild(opt);
    }
    Object.entries(POLES).forEach(([k, v]) => {
      const opt = document.createElement('option');
      opt.value = k;
      opt.textContent = tr.poleLabel(k, v);
      sel.appendChild(opt);
    });
    if (current) sel.value = current;
  });
}

function populateStatusSelect() {
  const tr = t();
  const current = gStatus.value || 'IFR';
  gStatus.innerHTML = '';
  Object.keys(tr.statusLabels).forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = tr.statusLabels[k];
    gStatus.appendChild(o);
  });
  gStatus.value = current;
}

function cascadeFromPole(preserve) {
  const tr = t();
  const code = gPole.value;
  const prevDom = gDomain.value;
  gDomain.innerHTML = `<option value="">${tr.selectPlaceholder}</option>`;
  if (!code) {
    gDomain.disabled = true;
    gSub.innerHTML = `<option value="">—</option>`;
    gSub.disabled = true;
    updatePreview();
    return;
  }
  const t_ = POLES[code].type;
  const domains = getDomains(t_);
  Object.keys(domains).forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    gDomain.appendChild(o);
  });
  gDomain.disabled = false;
  gPreviewBox.style.setProperty('--pole-color', POLES[code].color);
  // try to preserve domain by index when relanguage
  if (preserve && prevDom) {
    // if exact match exists, keep it; else try to find index in previous lang
    if (domains[prevDom]) gDomain.value = prevDom;
    else {
      // Search across all langs for the matching key, then map to current lang
      const block = DOMAINS[t_];
      let foundKey = null;
      for (const lang of ['fr','en']) {
        if (block[lang][prevDom]) { foundKey = block[lang][prevDom]; break; }
      }
      if (foundKey) {
        const labels = block[LANG] || block.fr;
        for (const label in labels) if (labels[label] === foundKey) { gDomain.value = label; break; }
      }
    }
  }
  cascadeFromDomain(preserve);
}

function cascadeFromDomain(preserve) {
  const tr = t();
  const pole = gPole.value;
  const dom = gDomain.value;
  const prevSub = gSub.value;
  gSub.innerHTML = `<option value="">${tr.selectPlaceholder}</option>`;
  if (!pole || !dom) { gSub.disabled = true; updatePreview(); return; }
  const t_ = POLES[pole].type;
  const domains = getDomains(t_);
  (domains[dom] || []).forEach(([code, name]) => {
    const o = document.createElement('option');
    o.value = code + '|' + name;
    o.textContent = `${code}_${name}`;
    gSub.appendChild(o);
  });
  gSub.disabled = false;
  if (preserve && prevSub) {
    const opt = Array.from(gSub.options).find(o => o.value === prevSub);
    if (opt) gSub.value = prevSub;
  }
  updatePreview();
}

[gSub, gDoc, gName, gStatus, gVersion].forEach(e => e.addEventListener('input', updatePreview));

function buildName() {
  const pole = gPole.value;
  const sub = gSub.value;
  const docnum = gDoc.value.trim();
  const name = kebab(gName.value);
  const status = gStatus.value;
  const version = gVersion.value.trim();

  if (!pole || !sub || !name || !version) return null;
  const [subCode] = sub.split('|');
  const verOk = /^\d+\.\d+$/.test(version);
  if (!verOk) return null;
  const docOk = !docnum || /^\d{5}$/.test(docnum);
  if (!docOk) return null;

  const parts = [];
  parts.push(`${pole}${subCode}`);
  if (docnum) parts.push(`[${docnum}]`);
  parts.push(name);
  parts.push(status);
  parts.push(`v${version}`);
  return { full: parts.join('_'), pole, subCode, docnum, name, status, version };
}

function updatePreview() {
  const tr = t();
  const data = buildName();
  if (!data) {
    gPreview.innerHTML = `<span style="color:#aaa;">${tr.fillRequired}</span>`;
    gDecode.innerHTML = '';
    gCopy.disabled = true;
    gSave.disabled = true;
    return;
  }
  const segs = [
    `<span class="seg pole">${data.pole}${data.subCode}</span>`,
    data.docnum ? `<span class="seg docnum">_[${data.docnum}]</span>` : '',
    `<span class="seg name">_${data.name}</span>`,
    `<span class="seg status">_${data.status}</span>`,
    `<span class="seg ver">_v${data.version}</span>`
  ].join('');
  gPreview.innerHTML = segs;

  const p = POLES[data.pole];
  const poleLabel = LANG === 'fr' ? p.labelFR : p.labelEN;
  gDecode.innerHTML = '';
  gDecode.style.setProperty('--pole-color', p.color);
  gDecode.appendChild(buildCell(tr.decode.pole, data.pole, `${p.site} · ${poleLabel}`));
  gDecode.appendChild(buildCell(tr.decode.subfolder, data.subCode, gSub.options[gSub.selectedIndex].textContent));
  if (data.docnum) gDecode.appendChild(buildCell(tr.decode.docnum, data.docnum, tr.pole5digits));
  gDecode.appendChild(buildCell(tr.decode.title, data.name, ''));
  gDecode.appendChild(buildCell(tr.decode.status, data.status, tr.statusDescriptions[data.status]));
  gDecode.appendChild(buildCell(tr.decode.version, `v${data.version}`, 'Major.Minor'));

  gCopy.disabled = false;
  gSave.disabled = false;
}

function buildCell(k, v, desc) {
  return el('div', { class: 'cell' }, [
    el('div', { class: 'k' }, k),
    el('div', { class: 'v' }, v),
    el('div', { class: 'desc' }, desc)
  ]);
}

gCopy.addEventListener('click', () => {
  const d = buildName(); if (!d) return;
  const tr = t();
  navigator.clipboard.writeText(d.full).then(() => {
    gCopy.textContent = tr.btnCopied;
    gCopy.classList.add('copied');
    setTimeout(() => { gCopy.textContent = tr.btnCopy; gCopy.classList.remove('copied'); }, 1500);
  });
});

gSave.addEventListener('click', () => {
  const d = buildName(); if (!d) return;
  const list = JSON.parse(localStorage.getItem('wcpdc_history') || '[]');
  list.unshift({ name: d.full, ts: Date.now() });
  localStorage.setItem('wcpdc_history', JSON.stringify(list.slice(0, 30)));
  renderHistory();
});

$('#g-reset').addEventListener('click', () => {
  gPole.value = '';
  cascadeFromPole(false);
  gDoc.value = ''; gName.value = ''; gStatus.value = 'IFR'; gVersion.value = '1.0';
  updatePreview();
});

function renderHistory() {
  const tr = t();
  const list = JSON.parse(localStorage.getItem('wcpdc_history') || '[]');
  const container = $('#g-history');
  if (!list.length) { container.innerHTML = `<div class="sub">${tr.historyEmpty}</div>`; return; }
  container.innerHTML = '';
  list.forEach((item, idx) => {
    const row = el('div', { class: 'hist-item' });
    row.appendChild(el('span', {}, item.name));
    const right = el('span');
    const copyBtn = el('button', { class: 'del', title: tr.btnCopy }, '⧉');
    copyBtn.addEventListener('click', e => { e.stopPropagation(); navigator.clipboard.writeText(item.name); });
    const delBtn = el('button', { class: 'del', title: '×' }, '×');
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      list.splice(idx, 1);
      localStorage.setItem('wcpdc_history', JSON.stringify(list));
      renderHistory();
    });
    right.appendChild(copyBtn);
    right.appendChild(delBtn);
    row.appendChild(right);
    row.addEventListener('click', () => navigator.clipboard.writeText(item.name));
    container.appendChild(row);
  });
}

// ============ VALIDATOR ============
const FILENAME_RE = /^([A-Z]{2})([0-9A-C][0-9A-C0-9])(?:_\[(\d{5})\])?_([A-Za-z0-9-]+)_(DRAFT|WIP|IFR|IFA|IFC|AB)_v(\d+\.\d+)(?:\.[a-zA-Z0-9]+)?$/;

$('#v-check').addEventListener('click', validate);
$('#v-input').addEventListener('keydown', e => { if (e.key === 'Enter') validate(); });
$('#v-example').addEventListener('click', () => {
  $('#v-input').value = 'AO43_[31014]_Steering-Committee-Pack_IFA_v2.5.pdf';
  validate();
});

function validate() {
  const tr = t();
  const v = $('#v-input').value.trim();
  const out = $('#v-result');
  out.innerHTML = '';
  if (!v) return;

  const errors = [];
  const m = v.match(FILENAME_RE);

  if (!m) {
    errors.push(tr.errPattern);
    if (!/^[A-Z]{2}/.test(v)) errors.push(tr.errStart);
    if (!/_v\d+\.\d+/.test(v)) errors.push(tr.errVersion);
    if (!/_(DRAFT|WIP|IFR|IFA|IFC|AB)_/.test(v)) errors.push(tr.errStatus);
    if (/\s/.test(v)) errors.push(tr.errSpaces);
    out.innerHTML = `<div class="val-result ko"><h4>${tr.valKoPattern}</h4><ul>${errors.map(e => '<li>' + e + '</li>').join('')}</ul></div>`;
    return;
  }

  const [, pole, subCode, docnum, name, status, version] = m;
  if (!POLES[pole]) errors.push(tr.errPole(pole));
  else {
    const found = findDomainForSub(POLES[pole].type, subCode);
    if (!found) errors.push(tr.errSub(subCode, pole));
  }

  if (errors.length) {
    out.innerHTML = `<div class="val-result ko"><h4>${tr.valKoSemantic}</h4><ul>${errors.map(e => '<li>' + e + '</li>').join('')}</ul></div>`;
    return;
  }

  const found = findDomainForSub(POLES[pole].type, subCode);
  const p = POLES[pole];
  const poleLabel = LANG === 'fr' ? p.labelFR : p.labelEN;
  out.innerHTML = `
    <div class="val-result ok">
      <h4>${tr.valOk}</h4>
      <div class="decode">
        <div class="cell"><div class="k">${tr.decode.pole}</div><div class="v">${pole}</div><div class="desc">${p.site} · ${poleLabel}</div></div>
        <div class="cell"><div class="k">${tr.decode.domain}</div><div class="v">${found.domain}</div><div class="desc">${subCode}_${found.name}</div></div>
        ${docnum ? `<div class="cell"><div class="k">${tr.decode.docnum}</div><div class="v">${docnum}</div><div class="desc">${tr.pole5digits}</div></div>` : ''}
        <div class="cell"><div class="k">${tr.decode.title}</div><div class="v">${name}</div><div class="desc">${name.split('-').join(' ')}</div></div>
        <div class="cell"><div class="k">${tr.decode.status}</div><div class="v">${status}</div><div class="desc">${tr.statusDescriptions[status]}</div></div>
        <div class="cell"><div class="k">${tr.decode.version}</div><div class="v">v${version}</div><div class="desc">Major.Minor</div></div>
      </div>
    </div>`;
}

// ============ REFERENCE ============
const rPole = $('#r-pole');
rPole.addEventListener('change', renderRef);
function renderRef() {
  if (!rPole.value) rPole.value = 'AF';
  const code = rPole.value;
  const t_ = POLES[code].type;
  const tree = $('#r-tree');
  tree.innerHTML = '';
  const domains = getDomains(t_);
  const poleColor = POLES[code].color;
  Object.entries(domains).forEach(([dom, subs]) => {
    const block = el('div', { class: 'ref-block', style: `--pole-color: ${poleColor};` });
    block.appendChild(el('h4', { style: `color: ${poleColor};` }, dom));
    const grid = el('div', { class: 'ref-grid' });
    subs.forEach(([c, n]) => grid.appendChild(el('div', {}, `${code}${c}_${n}`)));
    block.appendChild(grid);
    tree.appendChild(block);
  });
}
